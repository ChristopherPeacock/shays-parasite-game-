<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PARASITE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Navigate the bloodstream as a parasite">

  <!-- PWA / iOS home-screen -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PARASITE">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; font-family: monospace; color: #fff; overflow: hidden; }
    #ui { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 13px; max-width: 100%; width: min(800px, 100vw); padding: 0 4px; }
    #zone-name { font-size: 14px; letter-spacing: 3px; color: #aaa; }
    #message { margin-top: 6px; font-size: 11px; color: #333; text-align: center; }
    #shop-btn { background: rgba(30,20,5,0.85); border: 1px solid #555; color: #aaa; font-family: monospace; font-size: 12px; letter-spacing: 2px; cursor: pointer; padding: 3px 12px; transition: border-color 0.15s, color 0.15s; }
    #shop-btn:hover { border-color: #ffcc44; color: #ffcc44; }
    #game { max-width: 100%; height: auto; display: block; touch-action: none; }
    @media (max-height: 520px) { #message { display: none; } }
    #controls { display: none; width: min(800px, 100vw); align-items: center; justify-content: space-between; padding: 10px 24px; margin-top: 2px; }
    @media (hover: none) and (pointer: coarse) { #controls { display: flex; } }
    #joystick-zone { width: 120px; height: 100px; display: flex; align-items: center; justify-content: center; touch-action: none; }
    #joystick-ring { width: 88px; height: 88px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.05); position: relative; display: flex; align-items: center; justify-content: center; }
    #joystick-thumb { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.22); border: 2px solid rgba(255,255,255,0.4); position: absolute; pointer-events: none; }
    #sprint-dom { width: 76px; height: 76px; border-radius: 50%; background: rgba(80,160,255,0.12); border: 2px solid rgba(80,160,255,0.35); color: rgba(120,180,255,0.75); font-size: 22px; cursor: pointer; font-family: monospace; touch-action: none; transition: background 0.1s, border-color 0.1s; }
    #sprint-dom.on { background: rgba(255,200,40,0.32); border-color: rgba(255,200,40,0.8); color: rgba(255,220,80,1); }
  </style>
</head>
<body>
  <div id="ui">
    <span>❤ HEALTH: <span id="hval">100</span></span>
    <span id="zone-name">BLOODSTREAM</span>
    <span>🪙 <span id="tokval">500</span> &nbsp;·&nbsp; ⏱ <span id="tval">0.0s</span> &nbsp;·&nbsp; <button id="shop-btn" onclick="toggleShop()">SHOP</button></span>
  </div>
  <canvas id="game" width="800" height="500"></canvas>
  <div id="controls">
    <div id="joystick-zone"><div id="joystick-ring"><div id="joystick-thumb"></div></div></div>
    <div style="font-size:9px;color:#333;letter-spacing:2px;text-align:center">DRAG<br>TO MOVE</div>
    <button id="sprint-dom">⚡</button>
  </div>
  <div id="message">Touch &amp; drag to move · Eat yellow nutrients · Avoid red cells · Enter tubes to travel</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let state = 'playing'; // playing | upgrade | shop | dead | spread
    let tick = 0;
    let flashTimer = 0;

    // ── Skin Shop ──────────────────────────────────────────────────────────────
    let tokens = parseInt(localStorage.getItem('parasiteTokens') || '500');
    let ownedSkins = JSON.parse(localStorage.getItem('parasiteOwned') || '["TOXO"]');
    let equippedSkin = localStorage.getItem('parasiteEquipped') || 'TOXO';
    let shopCursor = 0;

    const SKINS = [
      { id:'TOXO',    name:'TOXOPLASMA',  cost:0,   desc:'The classic crescent',    draw: drawToxo    },
      { id:'GOLDEN',  name:'GOLDEN CYST', cost:100, desc:'Gilded parasite royalty',  draw: drawGolden  },
      { id:'NEON',    name:'NEON PULSE',  cost:150, desc:'Electric blue organism',   draw: drawNeon    },
      { id:'BLOOD',   name:'BLOOD WORM',  cost:200, desc:'Born deep in the veins',   draw: drawBlood   },
      { id:'SHADOW',  name:'SHADOW CELL', cost:250, desc:'Void parasite from beyond',draw: drawShadow  },
      { id:'PRISM',   name:'PRISM',       cost:300, desc:'Chromatic mutation',        draw: drawPrism   },
      { id:'CRYSTAL', name:'CRYSTAL',     cost:350, desc:'Transparent horror',        draw: drawCrystal },
    ];

    function saveShop(){
      localStorage.setItem('parasiteTokens', tokens);
      localStorage.setItem('parasiteOwned', JSON.stringify(ownedSkins));
      localStorage.setItem('parasiteEquipped', equippedSkin);
      document.getElementById('tokval').textContent = tokens;
    }

    function toggleShop(){
      if(state==='playing'){ state='shop'; document.getElementById('shop-btn').textContent='CLOSE'; }
      else if(state==='shop'){ state='playing'; document.getElementById('shop-btn').textContent='SHOP'; }
    }

    // ── Skin draw functions (called with ctx already translated+rotated) ────────
    function drawToxo(){
      const L=22,W=9;
      ctx.shadowColor='#66ff44';ctx.shadowBlur=10;
      ctx.beginPath();ctx.moveTo(L,0);ctx.bezierCurveTo(L*0.4,-W*1.1,-L*0.4,-W*1.15,-L,0);ctx.bezierCurveTo(-L*0.4,W*0.55,L*0.4,W*0.55,L,0);
      ctx.fillStyle='rgba(60,185,60,0.88)';ctx.fill();ctx.strokeStyle='rgba(130,255,100,0.5)';ctx.lineWidth=1.2;ctx.stroke();ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(L*0.75,-W*0.15);ctx.bezierCurveTo(L*0.2,-W*0.75,-L*0.2,-W*0.8,-L*0.7,-W*0.1);ctx.bezierCurveTo(-L*0.2,W*0.05,L*0.2,W*0.05,L*0.75,-W*0.15);ctx.fillStyle='rgba(180,255,140,0.2)';ctx.fill();
      ctx.beginPath();ctx.ellipse(-L*0.25,0,6,4,0,0,Math.PI*2);ctx.fillStyle='rgba(20,90,20,0.85)';ctx.fill();ctx.strokeStyle='rgba(80,200,80,0.5)';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(L*0.88,0,3.5,0,Math.PI*2);ctx.fillStyle='rgba(220,255,180,0.95)';ctx.fill();
      [-3,3].forEach(dy=>{ctx.beginPath();ctx.ellipse(-L*0.05,dy,2.5,1.5,-0.3,0,Math.PI*2);ctx.fillStyle='rgba(40,150,40,0.7)';ctx.fill();});
    }
    function drawGolden(){
      const L=22,W=9;
      ctx.shadowColor='#ffcc00';ctx.shadowBlur=14;
      ctx.beginPath();ctx.moveTo(L,0);ctx.bezierCurveTo(L*0.4,-W*1.1,-L*0.4,-W*1.15,-L,0);ctx.bezierCurveTo(-L*0.4,W*0.55,L*0.4,W*0.55,L,0);
      ctx.fillStyle='rgba(200,155,20,0.92)';ctx.fill();ctx.strokeStyle='rgba(255,215,60,0.8)';ctx.lineWidth=1.5;ctx.stroke();ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(L*0.7,-W*0.2);ctx.bezierCurveTo(L*0.1,-W*0.8,-L*0.2,-W*0.85,-L*0.65,-W*0.15);ctx.bezierCurveTo(-L*0.2,W*0.05,L*0.15,W*0.05,L*0.7,-W*0.2);ctx.fillStyle='rgba(255,240,120,0.35)';ctx.fill();
      ctx.beginPath();ctx.ellipse(-L*0.25,0,6,4,0,0,Math.PI*2);ctx.fillStyle='rgba(160,100,5,0.9)';ctx.fill();ctx.strokeStyle='rgba(255,200,50,0.6)';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(L*0.88,0,4,0,Math.PI*2);ctx.fillStyle='rgba(255,240,100,1)';ctx.fill();
      // crown spikes on top
      [-8,0,8].forEach(dx=>{ctx.beginPath();ctx.moveTo(dx,-W*0.9);ctx.lineTo(dx-3,-W*1.4);ctx.lineTo(dx+3,-W*1.4);ctx.closePath();ctx.fillStyle='rgba(255,215,50,0.7)';ctx.fill();});
    }
    function drawNeon(){
      const L=22,W=9;
      ctx.shadowColor='#00ffff';ctx.shadowBlur=18;
      ctx.beginPath();ctx.moveTo(L,0);ctx.bezierCurveTo(L*0.4,-W*1.1,-L*0.4,-W*1.15,-L,0);ctx.bezierCurveTo(-L*0.4,W*0.55,L*0.4,W*0.55,L,0);
      ctx.fillStyle='rgba(10,180,220,0.85)';ctx.fill();ctx.strokeStyle='rgba(0,255,255,0.9)';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
      // electric sparks
      [[L*0.3,-W],[0,-W*1.1],[-L*0.3,-W*0.9]].forEach(([sx,sy])=>{ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+(Math.sin(tick*0.3+sx)*4),sy-5);ctx.strokeStyle='rgba(100,255,255,0.8)';ctx.lineWidth=1.5;ctx.stroke();});
      ctx.beginPath();ctx.ellipse(-L*0.25,0,5,3.5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,100,140,0.9)';ctx.fill();ctx.strokeStyle='rgba(0,220,255,0.6)';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(L*0.88,0,4,0,Math.PI*2);ctx.fillStyle='rgba(180,255,255,1)';ctx.fill();
    }
    function drawBlood(){
      const L=26,W=7;
      ctx.shadowColor='#ff2244';ctx.shadowBlur=12;
      ctx.beginPath();ctx.moveTo(L,0);ctx.bezierCurveTo(L*0.5,-W,-L*0.5,-W,-L,0);ctx.bezierCurveTo(-L*0.5,W*0.8,L*0.5,W*0.8,L,0);
      ctx.fillStyle='rgba(180,20,20,0.9)';ctx.fill();ctx.strokeStyle='rgba(255,60,60,0.7)';ctx.lineWidth=1.5;ctx.stroke();ctx.shadowBlur=0;
      // segmentation lines
      [-8,0,8].forEach(x=>{ctx.beginPath();ctx.moveTo(x,-W*0.7);ctx.lineTo(x,W*0.7);ctx.strokeStyle='rgba(255,100,100,0.3)';ctx.lineWidth=1;ctx.stroke();});
      ctx.beginPath();ctx.ellipse(-L*0.2,0,5,3,0,0,Math.PI*2);ctx.fillStyle='rgba(100,5,5,0.9)';ctx.fill();
      ctx.beginPath();ctx.arc(L*0.9,0,3,0,Math.PI*2);ctx.fillStyle='rgba(255,160,160,0.95)';ctx.fill();
    }
    function drawShadow(){
      const L=22,W=9;
      ctx.shadowColor='#cc44ff';ctx.shadowBlur=20;
      ctx.beginPath();ctx.moveTo(L,0);ctx.bezierCurveTo(L*0.4,-W*1.1,-L*0.4,-W*1.15,-L,0);ctx.bezierCurveTo(-L*0.4,W*0.55,L*0.4,W*0.55,L,0);
      ctx.fillStyle='rgba(40,5,70,0.95)';ctx.fill();ctx.strokeStyle='rgba(180,60,255,0.8)';ctx.lineWidth=1.5;ctx.stroke();ctx.shadowBlur=0;
      // void tendrils
      [[L*0.2,W*0.5],[-L*0.1,W*0.6],[-L*0.3,W*0.3]].forEach(([tx,ty])=>{ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx+Math.sin(tick*0.05+tx)*3,ty+6);ctx.strokeStyle='rgba(150,50,220,0.5)';ctx.lineWidth=1;ctx.stroke();});
      ctx.beginPath();ctx.ellipse(-L*0.25,0,7,5,0,0,Math.PI*2);ctx.fillStyle='rgba(120,30,200,0.6)';ctx.fill();
      ctx.beginPath();ctx.arc(L*0.88,0,4,0,Math.PI*2);ctx.fillStyle='rgba(220,180,255,0.95)';ctx.fill();
    }
    function drawPrism(){
      const L=22,W=9,hue=(tick*2)%360;
      ctx.shadowColor=`hsl(${hue},100%,60%)`;ctx.shadowBlur=14;
      ctx.beginPath();ctx.moveTo(L,0);ctx.bezierCurveTo(L*0.4,-W*1.1,-L*0.4,-W*1.15,-L,0);ctx.bezierCurveTo(-L*0.4,W*0.55,L*0.4,W*0.55,L,0);
      ctx.fillStyle=`hsla(${hue},90%,45%,0.88)`;ctx.fill();ctx.strokeStyle=`hsla(${(hue+60)%360},100%,70%,0.8)`;ctx.lineWidth=1.5;ctx.stroke();ctx.shadowBlur=0;
      ctx.beginPath();ctx.ellipse(-L*0.25,0,6,4,0,0,Math.PI*2);ctx.fillStyle=`hsla(${(hue+180)%360},80%,25%,0.9)`;ctx.fill();
      ctx.beginPath();ctx.arc(L*0.88,0,4,0,Math.PI*2);ctx.fillStyle=`hsla(${(hue+90)%360},100%,85%,1)`;ctx.fill();
    }
    function drawCrystal(){
      const L=22,W=9;
      ctx.shadowColor='#aaddff';ctx.shadowBlur=16;
      ctx.beginPath();ctx.moveTo(L,0);ctx.bezierCurveTo(L*0.4,-W*1.1,-L*0.4,-W*1.15,-L,0);ctx.bezierCurveTo(-L*0.4,W*0.55,L*0.4,W*0.55,L,0);
      ctx.fillStyle='rgba(180,220,255,0.35)';ctx.fill();ctx.strokeStyle='rgba(200,240,255,0.9)';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
      // facet lines
      [[L*0.5,0],[0,-W*0.5],[-L*0.4,0]].forEach(([fx,fy])=>{ctx.beginPath();ctx.moveTo(L,0);ctx.lineTo(fx,fy);ctx.strokeStyle='rgba(220,245,255,0.3)';ctx.lineWidth=1;ctx.stroke();});
      ctx.beginPath();ctx.ellipse(-L*0.25,0,5,3,0,0,Math.PI*2);ctx.fillStyle='rgba(100,160,220,0.7)';ctx.fill();ctx.strokeStyle='rgba(200,240,255,0.8)';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(L*0.88,0,4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.98)';ctx.fill();
    }

    // ── Timer ──────────────────────────────────────────────────────────────────
    let startTime = Date.now();
    let elapsedMs = 0;
    let bestTime = parseFloat(localStorage.getItem('parasiteBest') || '0');

    // ── Token economy ──────────────────────────────────────────────────────────
    const TOKEN_PER_ZONE   = 15;  // earned each time you clear a zone
    const TOKEN_WIN_BONUS  = 50;  // bonus for completing all 5
    const TOKEN_SPEED_MAX  = 100; // up to 100 extra for fast clears (sub-60s = full)
    let tokensEarnedThisRun = 0;
    let lastZoneTokens = 0; // shown on upgrade screen

    // ── Upgrades ───────────────────────────────────────────────────────────────
    let infectionPerNutrient = 1;
    let wbcSlowFactor = 1;
    let playerArmor = false;
    let playerRegen = false;
    let upgradeOptions = [];

    const UPGRADE_POOL = [
      { name: 'SPEED BOOST',    desc: 'Move 25% faster',              apply: () => { player.speed *= 1.25; } },
      { name: 'THICK MEMBRANE', desc: 'Restore 30 health',            apply: () => { player.health = Math.min(100, player.health + 30); } },
      { name: 'RAPID INVASION', desc: 'Nutrients give +2% each',      apply: () => { infectionPerNutrient = 2; } },
      { name: 'CELL ARMOR',     desc: 'Take 50% less damage',         apply: () => { playerArmor = true; } },
      { name: 'REGENERATION',   desc: 'Slowly heal over time',        apply: () => { playerRegen = true; } },
      { name: 'CAMOUFLAGE',     desc: 'WBCs move 30% slower',         apply: () => { wbcSlowFactor = 0.7; } },
      { name: 'BLITZ CYST',     desc: 'Temporary invincibility 3×',   apply: () => { player.inv = 180; } },
    ];

    function pickUpgrades() {
      const pool = [...UPGRADE_POOL];
      upgradeOptions = [];
      for (let i = 0; i < 3 && pool.length; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        upgradeOptions.push(pool.splice(idx, 1)[0]);
      }
    }

    document.addEventListener('keydown', e => {
      if(e.key==='s'||e.key==='S') { toggleShop(); return; }

      if(state==='shop'){
        if(e.key==='ArrowRight') shopCursor=(shopCursor+1)%SKINS.length;
        else if(e.key==='ArrowLeft') shopCursor=(shopCursor-1+SKINS.length)%SKINS.length;
        else if(e.key==='ArrowDown') shopCursor=Math.min(SKINS.length-1,shopCursor+4);
        else if(e.key==='ArrowUp') shopCursor=Math.max(0,shopCursor-4);
        else if(e.key==='Enter'||e.key===' '){
          const sk=SKINS[shopCursor];
          if(ownedSkins.includes(sk.id)){ equippedSkin=sk.id; saveShop(); }
          else if(tokens>=sk.cost){ tokens-=sk.cost; ownedSkins.push(sk.id); equippedSkin=sk.id; saveShop(); }
        }
        else if(e.key==='Escape') state='playing';
        return;
      }

      if(state==='upgrade'){
        const n=parseInt(e.key);
        if(n>=1&&n<=upgradeOptions.length){ upgradeOptions[n-1].apply(); state='playing'; }
      }
    });

    // ── Organ SVGs ─────────────────────────────────────────────────────────────
    const ORGAN_SVGS = [
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
        <circle cx="400" cy="250" r="230" fill="#3a0010" opacity="0.55"/>
        <circle cx="400" cy="250" r="195" fill="#180008" opacity="0.6"/>
        <circle cx="400" cy="250" r="160" fill="#8B0000" opacity="0.22"/>
        <ellipse cx="340" cy="210" rx="40" ry="24" fill="#cc2040" opacity="0.45" transform="rotate(-15,340,210)"/>
        <ellipse cx="340" cy="210" rx="18" ry="10" fill="#330010" opacity="0.55" transform="rotate(-15,340,210)"/>
        <ellipse cx="430" cy="255" rx="40" ry="24" fill="#cc2040" opacity="0.45" transform="rotate(10,430,255)"/>
        <ellipse cx="430" cy="255" rx="18" ry="10" fill="#330010" opacity="0.55" transform="rotate(10,430,255)"/>
        <ellipse cx="360" cy="295" rx="38" ry="22" fill="#cc2040" opacity="0.45" transform="rotate(-5,360,295)"/>
        <ellipse cx="360" cy="295" rx="17" ry="9"  fill="#330010" opacity="0.55" transform="rotate(-5,360,295)"/>
        <ellipse cx="460" cy="200" rx="34" ry="20" fill="#cc2040" opacity="0.4"  transform="rotate(20,460,200)"/>
        <ellipse cx="460" cy="200" rx="15" ry="8"  fill="#330010" opacity="0.5"  transform="rotate(20,460,200)"/>
        <circle cx="400" cy="250" r="230" fill="none" stroke="#6a0020" stroke-width="18" opacity="0.35"/>
        <circle cx="400" cy="250" r="195" fill="none" stroke="#4a0015" stroke-width="12" opacity="0.3"/>
      </svg>`,
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
        <rect x="388" y="20" width="24" height="90" rx="12" fill="#1a3a5c" opacity="0.5"/>
        <path d="M388,105 Q310,125 250,170" stroke="#1a3a5c" stroke-width="16" fill="none" opacity="0.5" stroke-linecap="round"/>
        <path d="M412,105 Q490,125 550,170" stroke="#1a3a5c" stroke-width="16" fill="none" opacity="0.5" stroke-linecap="round"/>
        <path d="M250,170 Q185,200 150,250 Q120,305 135,360 Q150,410 200,430 Q255,448 300,430 Q345,410 355,360 Q365,300 340,240 Q315,180 270,165Z" fill="#0a2040" opacity="0.5" stroke="#1a4070" stroke-width="2"/>
        <path d="M130,265 Q195,250 355,268" stroke="#1a4070" stroke-width="2.5" fill="none" opacity="0.35"/>
        <path d="M125,310 Q192,296 355,313" stroke="#1a4070" stroke-width="2.5" fill="none" opacity="0.35"/>
        <path d="M550,170 Q615,200 650,250 Q680,305 665,360 Q650,410 600,430 Q545,448 500,430 Q455,410 445,360 Q435,300 460,240 Q485,180 530,165Z" fill="#0a2040" opacity="0.5" stroke="#1a4070" stroke-width="2"/>
        <path d="M670,265 Q605,250 445,268" stroke="#1a4070" stroke-width="2.5" fill="none" opacity="0.35"/>
        <path d="M675,310 Q608,296 445,313" stroke="#1a4070" stroke-width="2.5" fill="none" opacity="0.35"/>
      </svg>`,
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
        <ellipse cx="370" cy="230" rx="300" ry="190" fill="#2a1a3a" opacity="0.5"/>
        <path d="M100,195 Q150,170 200,195 Q250,220 300,195 Q350,170 400,195 Q450,220 500,195 Q550,170 600,195 Q640,215 660,210" stroke="#7040b0" stroke-width="9" fill="none" opacity="0.45" stroke-linecap="round"/>
        <path d="M82,230 Q135,207 188,230 Q240,253 293,230 Q345,207 398,230 Q450,253 503,230 Q555,207 608,230 Q648,248 665,244" stroke="#7040b0" stroke-width="9" fill="none" opacity="0.45" stroke-linecap="round"/>
        <path d="M75,268 Q128,245 182,268 Q235,291 289,268 Q342,245 396,268 Q449,291 503,268 Q556,245 610,268 Q648,283 665,280" stroke="#7040b0" stroke-width="8" fill="none" opacity="0.4" stroke-linecap="round"/>
        <ellipse cx="595" cy="370" rx="100" ry="72" fill="#1e1230" opacity="0.5"/>
        <rect x="348" y="398" width="36" height="72" rx="18" fill="#1e1230" opacity="0.45"/>
      </svg>`,
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
        <path d="M400,460 C280,385 100,310 100,190 C100,105 160,55 230,55 C278,55 320,80 400,130 C480,80 522,55 570,55 C640,55 700,105 700,190 C700,310 520,385 400,460Z" fill="#1a0005" opacity="0.45" stroke="#6a0015" stroke-width="3"/>
        <line x1="400" y1="100" x2="400" y2="430" stroke="#8a0020" stroke-width="6" opacity="0.45"/>
        <path d="M145,210 Q270,195 400,202 Q530,195 655,210" stroke="#8a0020" stroke-width="4" fill="none" opacity="0.4"/>
        <ellipse cx="490" cy="165" rx="90" ry="60" fill="#2a0010" opacity="0.28"/>
        <ellipse cx="310" cy="165" rx="90" ry="60" fill="#2a0010" opacity="0.28"/>
        <path d="M335,90 Q340,40 375,28 Q405,18 415,50 Q422,75 408,100" stroke="#7a0018" stroke-width="20" fill="none" opacity="0.45" stroke-linecap="round"/>
      </svg>`,
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
        <rect x="375" y="10" width="30" height="100" rx="15" fill="#1a3a0a" opacity="0.5"/>
        <path d="M375,105 Q255,115 215,185 Q175,258 185,330 Q195,395 255,435 Q315,468 385,460 Q460,450 510,415 Q565,375 575,315 Q588,248 560,185 Q530,125 460,108 Q415,95 375,105Z" fill="#0f2008" opacity="0.52" stroke="#2a5010" stroke-width="3"/>
        <path d="M218,210 Q310,194 420,205 Q490,212 560,225" stroke="#2d5a12" stroke-width="5" fill="none" opacity="0.4" stroke-linecap="round"/>
        <path d="M205,255 Q298,239 415,250 Q488,257 562,272" stroke="#2d5a12" stroke-width="5" fill="none" opacity="0.4" stroke-linecap="round"/>
        <path d="M196,302 Q292,286 414,297 Q488,304 562,320" stroke="#2d5a12" stroke-width="5" fill="none" opacity="0.38" stroke-linecap="round"/>
        <ellipse cx="385" cy="420" rx="140" ry="30" fill="#1a4a00" opacity="0.18"/>
      </svg>`,
    ];
    const organImgs = ORGAN_SVGS.map(svg => {
      const img = new Image();
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
      return img;
    });

    // ── Zones ──────────────────────────────────────────────────────────────────
    const ZONES = [
      { name: 'BLOODSTREAM', bg: '#0f0408', wbcSpeed: 0.7, wbcMax: 10 },
      { name: 'LUNGS',       bg: '#060d18', wbcSpeed: 0.55,wbcMax: 7  },
      { name: 'BRAIN',       bg: '#0d0b14', wbcSpeed: 1.0, wbcMax: 14 },
      { name: 'HEART',       bg: '#100404', wbcSpeed: 1.2, wbcMax: 16 },
      { name: 'STOMACH',     bg: '#080f06', wbcSpeed: 0.4, wbcMax: 6  },
    ];
    let zonePools = [20,20,20,20,20];
    let zoneIndex = 0;
    let zone = ZONES[0];

    // Body map organ positions (icons drawn at bottom-center HUD)
    // Each: { label, cx, cy } relative to body map origin
    const BODY_MAP = [
      { label:'BRAIN',       cx:0,   cy:-38 },
      { label:'LUNGS',       cx:0,   cy:-18 },
      { label:'HEART',       cx:-10, cy:-10 },
      { label:'STOMACH',     cx:0,   cy:4   },
      { label:'BLOODSTREAM', cx:0,   cy:20  },
    ];

    // ── Background geometry ────────────────────────────────────────────────────
    let bgData = {};
    function buildBG() {
      bgData = {};
      switch(zoneIndex) {
        case 0:
          bgData.vessels = Array.from({length:5},()=>({x1:Math.random()*800,y1:Math.random()*500,x2:Math.random()*800,y2:Math.random()*500,w:40+Math.random()*60}));
          bgData.rbcs = Array.from({length:20},()=>({x:Math.random()*800,y:Math.random()*500,rx:10+Math.random()*8,ry:5+Math.random()*4,angle:Math.random()*Math.PI,drift:(Math.random()-0.5)*0.4}));
          break;
        case 1: bgData.alveoli=Array.from({length:35},()=>({x:30+Math.random()*740,y:30+Math.random()*440,r:8+Math.random()*14})); break;
        case 2: bgData.synapses=Array.from({length:28},()=>({x:Math.random()*800,y:Math.random()*500,r:2+Math.random()*3})); break;
        case 3: bgData.striations=Array.from({length:30},(_,i)=>({y:i*18,len:600+Math.random()*200,offset:Math.random()*40})); break;
        case 4: bgData.bubbles=Array.from({length:35},()=>({x:Math.random()*800,y:80+Math.random()*360,r:3+Math.random()*8,phase:Math.random()*Math.PI*2})); break;
      }
    }
    buildBG();

    function drawBG() {
      ctx.fillStyle=zone.bg; ctx.fillRect(0,0,800,500);
      const img=organImgs[zoneIndex];
      if(img.complete){ctx.globalAlpha=0.28;ctx.drawImage(img,0,0,800,500);ctx.globalAlpha=1;}
      switch(zoneIndex){
        case 0: bgData.rbcs.forEach(r=>{r.x+=r.drift;if(r.x>820)r.x=-20;if(r.x<-20)r.x=820;ctx.save();ctx.translate(r.x,r.y);ctx.rotate(r.angle);ctx.beginPath();ctx.ellipse(0,0,r.rx,r.ry,0,0,Math.PI*2);ctx.fillStyle='rgba(180,20,40,0.12)';ctx.fill();ctx.restore();}); break;
        case 2: bgData.synapses.forEach(s=>{const g=0.25+Math.sin(tick*0.03+s.x)*0.12;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(160,80,255,${g})`;ctx.fill();}); break;
        case 3: ctx.fillStyle=`rgba(200,10,10,${0.04+Math.sin(tick*0.08)*0.06})`;ctx.fillRect(0,0,800,500); break;
        case 4: bgData.bubbles.forEach(b=>{b.y-=0.15;b.phase+=0.02;if(b.y<60){b.y=440;b.x=Math.random()*800;}ctx.beginPath();ctx.arc(b.x+Math.sin(b.phase)*3,b.y,b.r,0,Math.PI*2);ctx.strokeStyle='rgba(100,220,40,0.13)';ctx.lineWidth=1.5;ctx.stroke();}); break;
      }
    }

    // ── Portals / Tubes ────────────────────────────────────────────────────────
    function makePortals() {
      const prev=(zoneIndex-1+ZONES.length)%ZONES.length;
      const next=(zoneIndex+1)%ZONES.length;
      const lbl=i=>ZONES[i].name+(zonePools[i]===0?' ✓':` (${zonePools[i]})`);
      return [
        {x:38,  y:250,destIndex:prev,label:lbl(prev),pulse:0},
        {x:762, y:250,destIndex:next,label:lbl(next),pulse:Math.PI},
      ];
    }
    let portals = makePortals();

    // ── Player ─────────────────────────────────────────────────────────────────
    const player = {x:400,y:250,r:11,speed:3.2,health:100,infection:0,inv:0,angle:0};
    const keys = {};
    document.addEventListener('keydown', e=>{keys[e.key]=true;});
    document.addEventListener('keyup',   e=>{keys[e.key]=false;});

    // ── Mouse follow ───────────────────────────────────────────────────────────
    let mouse = { cx: 400, cy: 250, active: false };
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.cx = (e.clientX - rect.left) * (800 / rect.width);
      mouse.cy = (e.clientY - rect.top)  * (500 / rect.height);
      mouse.active = true;
    });
    canvas.addEventListener('mouseleave', () => { mouse.active = false; });

    // ── Sprint ─────────────────────────────────────────────────────────────────
    let sprintMeter = 100;
    let isSprinting = false;
    let stillTicks = 0;
    const BASE_SPEED = 3.2;
    const SPRINT_MULT = 1.7;
    const SPRINT_DRAIN = 0.38;   // per tick while sprinting
    const SPRINT_REGEN = 1.4;    // per tick while still after 3s
    const STILL_DELAY = 180;     // ticks before regen kicks in (3s at 60fps)
    const SPRINT_BTN = { x:720, y:430, r:28 }; // mobile sprint button position

    // ── Nutrients ──────────────────────────────────────────────────────────────
    let nutrients = [];
    function spawnNutrient(){
      if(zonePools[zoneIndex]<=0) return;
      nutrients.push({x:80+Math.random()*640,y:40+Math.random()*420,r:5+Math.random()*5,pulse:Math.random()*Math.PI*2});
    }
    function refillNutrients(){nutrients=[];const c=Math.min(zonePools[zoneIndex],8);for(let i=0;i<c;i++)spawnNutrient();}
    refillNutrients();

    // ── WBCs ───────────────────────────────────────────────────────────────────
    let wbcs=[];
    function spawnWBC(){
      const side=Math.floor(Math.random()*4);let x,y;
      if(side===0){x=Math.random()*800;y=-20;}
      else if(side===1){x=820;y=Math.random()*500;}
      else if(side===2){x=Math.random()*800;y=520;}
      else{x=-20;y=Math.random()*500;}
      wbcs.push({x,y,r:14,speed:(0.9+Math.random()*0.8)*zone.wbcSpeed*wbcSlowFactor,wobble:Math.random()*Math.PI*2});
    }
    function refillWBCs(){wbcs=[];for(let i=0;i<4;i++)spawnWBC();}
    refillWBCs();

    // ── Elite WBCs (2, always present, high damage) ────────────────────────────
    let eliteWBCs = [];
    function spawnEliteWBC(){
      const side=Math.floor(Math.random()*4);let x,y;
      if(side===0){x=Math.random()*800;y=-30;}
      else if(side===1){x=830;y=Math.random()*500;}
      else if(side===2){x=Math.random()*800;y=530;}
      else{x=-30;y=Math.random()*500;}
      eliteWBCs.push({x,y,r:20,speed:(1.1+Math.random()*0.4)*zone.wbcSpeed*wbcSlowFactor,wobble:Math.random()*Math.PI*2});
    }
    function refillEliteWBCs(){eliteWBCs=[];spawnEliteWBC();spawnEliteWBC();}
    refillEliteWBCs();

    let wbcTimer=0;
    function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}

    // ── Zone enter ─────────────────────────────────────────────────────────────
    function enterZone(index){
      zoneIndex=index;zone=ZONES[zoneIndex];
      portals=makePortals();buildBG();
      refillNutrients();refillWBCs();refillEliteWBCs();wbcTimer=0;
      player.x=400;player.y=250;player.inv=60;
      flashTimer=25;
      const cl=zonePools[zoneIndex]===0?' ✓':'';
      document.getElementById('zone-name').textContent=zone.name+cl;
    }

    function reset(){
      zoneIndex=0;zone=ZONES[0];
      zonePools=[20,20,20,20,20];
      infectionPerNutrient=1;wbcSlowFactor=1;playerArmor=false;playerRegen=false;
      sprintMeter=100;isSprinting=false;setSprintDom(false);stillTicks=0;
      player.x=400;player.y=250;player.health=100;player.infection=0;player.inv=0;player.angle=0;player.speed=BASE_SPEED;
      portals=makePortals();buildBG();refillNutrients();refillWBCs();refillEliteWBCs();wbcTimer=0;
      startTime=Date.now();elapsedMs=0;tokensEarnedThisRun=0;state='playing';
      document.getElementById('zone-name').textContent=zone.name;
      document.getElementById('tokval').textContent=tokens;
    }

    document.addEventListener('keydown',e=>{
      if((e.key==='r'||e.key==='R')&&(state==='dead'||state==='spread')) reset();
      if(e.key==='Shift'){ isSprinting=!isSprinting; setSprintDom(isSprinting); }
    });

    // ── Touch helpers ──────────────────────────────────────────────────────────
    function getCanvasPos(touch) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (touch.clientX - rect.left) * (800 / rect.width),
        y: (touch.clientY - rect.top)  * (500 / rect.height)
      };
    }

    canvas.addEventListener('click', e => {
      if(state !== 'shop') return;
      const pos = getCanvasPos(e);
      if(pos.x>=316 && pos.x<=484 && pos.y>=68 && pos.y<=98){ toggleShop(); return; }
      SKINS.forEach((sk,i)=>{
        const col=i%4, row=Math.floor(i/4);
        const bw=168,bh=130,gap=12;
        const startX=(800-(4*(bw+gap)-gap))/2;
        const bx=startX+col*(bw+gap), by=106+row*(bh+gap);
        if(pos.x>=bx&&pos.x<=bx+bw&&pos.y>=by&&pos.y<=by+bh){
          shopCursor=i;
          if(ownedSkins.includes(sk.id)){equippedSkin=sk.id;saveShop();}
          else if(tokens>=sk.cost){tokens-=sk.cost;ownedSkins.push(sk.id);equippedSkin=sk.id;saveShop();}
        }
      });
    });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const touch = e.changedTouches[0];
      const pos = getCanvasPos(touch);

      if (state === 'dead' || state === 'spread') { reset(); return; }

      if (state === 'upgrade') {
        upgradeOptions.forEach((u, i) => {
          const bx=80+i*220, by=150, bw=200, bh=120;
          if (pos.x>=bx && pos.x<=bx+bw && pos.y>=by && pos.y<=by+bh) {
            u.apply(); state='playing';
          }
        });
        return;
      }

      if (state === 'shop') {
        if (pos.x>=316 && pos.x<=484 && pos.y>=68 && pos.y<=98) { toggleShop(); return; }
        SKINS.forEach((sk, i) => {
          const col=i%4, row=Math.floor(i/4);
          const bw=168, bh=130, gap=12;
          const startX=(800-(4*(bw+gap)-gap))/2;
          const bx=startX+col*(bw+gap), by=106+row*(bh+gap);
          if (pos.x>=bx && pos.x<=bx+bw && pos.y>=by && pos.y<=by+bh) {
            shopCursor=i;
            if (ownedSkins.includes(sk.id)) { equippedSkin=sk.id; saveShop(); }
            else if (tokens>=sk.cost) { tokens-=sk.cost; ownedSkins.push(sk.id); equippedSkin=sk.id; saveShop(); }
          }
        });
        return;
      }

    }, { passive: false });

    // ── DOM joystick (outside canvas) ─────────────────────────────────────────
    const joyZone  = document.getElementById('joystick-zone');
    const joyRing  = document.getElementById('joystick-ring');
    const joyThumb = document.getElementById('joystick-thumb');
    const sprintDom = document.getElementById('sprint-dom');
    let joyTouchId = null;
    const JOY_R = 38;

    function setSprintDom(on) { sprintDom.classList.toggle('on', on); }

    joyZone.addEventListener('touchstart', e => {
      e.preventDefault();
      if (joyTouchId !== null) return;
      joyTouchId = e.changedTouches[0].identifier;
    }, { passive: false });

    joyZone.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier !== joyTouchId) continue;
        const rect = joyRing.getBoundingClientRect();
        const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
        const dx = t.clientX - cx, dy = t.clientY - cy;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        const clamped = Math.min(d, JOY_R);
        joyThumb.style.transform = `translate(${dx/d*clamped}px,${dy/d*clamped}px)`;
        const dead = 10;
        keys['ArrowLeft']  = dx < -dead;
        keys['ArrowRight'] = dx >  dead;
        keys['ArrowUp']    = dy < -dead;
        keys['ArrowDown']  = dy >  dead;
      }
    }, { passive: false });

    joyZone.addEventListener('touchend', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier !== joyTouchId) continue;
        joyTouchId = null;
        joyThumb.style.transform = 'translate(0,0)';
        keys['ArrowLeft']=keys['ArrowRight']=keys['ArrowUp']=keys['ArrowDown']=false;
      }
    }, { passive: false });

    sprintDom.addEventListener('touchstart', e => {
      e.preventDefault();
      isSprinting = !isSprinting;
      setSprintDom(isSprinting);
    }, { passive: false });

    // ── Update ─────────────────────────────────────────────────────────────────
    function update(){
      if(state==='upgrade'||state==='shop'||state==='dead'||state==='spread') return;
      tick++;
      if(flashTimer>0) flashTimer--;
      elapsedMs=Date.now()-startTime;

      // Movement — mouse follow on PC, WASD fallback
      let mvx = 0, mvy = 0;
      const dxM = mouse.cx - player.x, dyM = mouse.cy - player.y;
      const distM = Math.sqrt(dxM*dxM + dyM*dyM);
      if (mouse.active && distM > 8) {
        mvx = dxM / distM; mvy = dyM / distM;
      } else if (!mouse.active) {
        const ml=(keys['ArrowLeft'] ||keys['a']||keys['A'])?1:0;
        const mr=(keys['ArrowRight']||keys['d']||keys['D'])?1:0;
        const mu=(keys['ArrowUp']   ||keys['w']||keys['W'])?1:0;
        const md=(keys['ArrowDown'] ||keys['s']||keys['S'])?1:0;
        mvx=mr-ml; mvy=md-mu;
        const mlen=Math.sqrt(mvx*mvx+mvy*mvy)||1;
        if(mvx||mvy){mvx/=mlen;mvy/=mlen;}
      }
      const moving = mvx!==0||mvy!==0;
      if(moving) player.angle=Math.atan2(mvy,mvx);

      // Sprint logic
      if(isSprinting && sprintMeter<=0){ isSprinting=false; setSprintDom(false); }
      const sprintActive = isSprinting && sprintMeter>0;
      const curSpeed = sprintActive ? BASE_SPEED*SPRINT_MULT : BASE_SPEED;
      player.speed = curSpeed;
      if(sprintActive) sprintMeter=Math.max(0,sprintMeter-SPRINT_DRAIN);

      // Still timer — regen after 3s of no movement
      if(moving) { stillTicks=0; }
      else { stillTicks++; }
      if(stillTicks>=STILL_DELAY && !sprintActive) sprintMeter=Math.min(100,sprintMeter+SPRINT_REGEN);

      // Clamp step to not overshoot the mouse cursor
      const step = (mouse.active && distM < curSpeed) ? distM : curSpeed;
      player.x+=mvx*step;player.y+=mvy*step;
      player.x=Math.max(player.r,Math.min(800-player.r,player.x));
      player.y=Math.max(player.r,Math.min(500-player.r,player.y));

      // Regen
      if(playerRegen&&tick%90===0) player.health=Math.min(100,player.health+1);

      // Tubes
      portals=makePortals();
      portals.forEach(p=>{
        p.pulse+=0.05;
        if(dist(player,p)<player.r+28) enterZone(p.destIndex);
      });

      // Nutrients
      nutrients=nutrients.filter(n=>{
        n.pulse+=0.06;
        if(dist(player,n)<player.r+n.r){
          zonePools[zoneIndex]=Math.max(0,zonePools[zoneIndex]-1);
          player.infection=Math.min(100,player.infection+infectionPerNutrient);
          if(zonePools[zoneIndex]>0) spawnNutrient();
          else {
            // Zone cleared — earn tokens + offer upgrade
            lastZoneTokens = TOKEN_PER_ZONE;
            tokens += lastZoneTokens;
            tokensEarnedThisRun += lastZoneTokens;
            saveShop();
            pickUpgrades();
            state='upgrade';
            document.getElementById('zone-name').textContent=zone.name+' ✓';
          }
          return false;
        }
        return true;
      });
      // Keep 8 nutrients on screen while the zone pool still has food
      while(nutrients.length<8&&zonePools[zoneIndex]>nutrients.length) spawnNutrient();

      // WBCs
      wbcTimer++;
      if(wbcTimer>220&&wbcs.length<zone.wbcMax){spawnWBC();wbcTimer=0;}
      wbcs.forEach(w=>{
        w.wobble+=0.08;
        const dx=player.x-w.x,dy=player.y-w.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        w.x+=(dx/d)*w.speed+Math.sin(w.wobble)*0.4;
        w.y+=(dy/d)*w.speed+Math.cos(w.wobble)*0.4;
        if(player.inv<=0&&dist(player,w)<player.r+w.r-3){
          const dmg=playerArmor?3.5:7;
          player.health-=dmg;player.inv=55;
          if(player.health<=0){player.health=0;state='dead';}
        }
      });
      // Elite WBCs
      eliteWBCs.forEach(w=>{
        w.wobble+=0.05;
        const dx=player.x-w.x,dy=player.y-w.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        w.x+=(dx/d)*w.speed+Math.sin(w.wobble)*0.3;
        w.y+=(dy/d)*w.speed+Math.cos(w.wobble)*0.3;
        if(player.inv<=0&&dist(player,w)<player.r+w.r-4){
          const dmg=playerArmor?7.5:15;
          player.health-=dmg;player.inv=55;
          if(player.health<=0){player.health=0;state='dead';}
        }
      });

      if(player.inv>0) player.inv--;
      if(player.infection>=100){
        const t=elapsedMs/1000;
        if(!bestTime||t<bestTime){bestTime=t;localStorage.setItem('parasiteBest',t);}
        // Speed bonus: 100 tokens for sub-60s, scales down to 0 at 300s
        const speedBonus=Math.max(0,Math.round(TOKEN_SPEED_MAX*Math.max(0,(300-t)/240)));
        const winBonus=TOKEN_WIN_BONUS+speedBonus;
        tokens+=winBonus; tokensEarnedThisRun+=winBonus; saveShop();
        state='spread';
      }

      document.getElementById('hval').textContent=Math.max(0,Math.ceil(player.health));
      document.getElementById('tval').textContent=(elapsedMs/1000).toFixed(1)+'s';
    }

    // ── Draw body map ──────────────────────────────────────────────────────────
    function drawBodyMap(){
      // Small human silhouette at bottom center
      const ox=400,oy=484;
      // Head
      ctx.beginPath();ctx.arc(ox,oy-50,8,0,Math.PI*2);
      ctx.strokeStyle='rgba(100,100,100,0.5)';ctx.lineWidth=1.5;ctx.stroke();
      // Torso
      ctx.beginPath();ctx.rect(ox-9,oy-42,18,35);
      ctx.strokeStyle='rgba(100,100,100,0.5)';ctx.lineWidth=1.5;ctx.stroke();
      // Legs
      ctx.beginPath();ctx.moveTo(ox-9,oy-7);ctx.lineTo(ox-9,oy+12);
      ctx.moveTo(ox+9,oy-7);ctx.lineTo(ox+9,oy+12);
      ctx.strokeStyle='rgba(100,100,100,0.5)';ctx.lineWidth=1.5;ctx.stroke();

      // Organ dots — light up when cleared
      const organs = [
        {zi:2, x:ox,    y:oy-46, label:'BRAIN'},     // brain (head)
        {zi:1, x:ox-6,  y:oy-32, label:'LUNGS'},     // lungs (upper torso)
        {zi:3, x:ox+4,  y:oy-28, label:'HEART'},     // heart (upper torso right)
        {zi:0, x:ox,    y:oy-20, label:'BLOOD'},     // bloodstream (mid torso)
        {zi:4, x:ox,    y:oy-10, label:'STOMACH'},   // stomach (lower torso)
      ];
      organs.forEach(o=>{
        const cleared=zonePools[o.zi]===0;
        const current=zoneIndex===o.zi;
        ctx.beginPath();ctx.arc(o.x,o.y,4,0,Math.PI*2);
        if(cleared) ctx.fillStyle='rgba(60,220,80,0.9)';
        else if(current) ctx.fillStyle='rgba(255,220,60,0.9)';
        else ctx.fillStyle='rgba(80,80,80,0.6)';
        ctx.fill();
        if(cleared){ctx.strokeStyle='rgba(60,220,80,0.5)';ctx.lineWidth=1.5;ctx.stroke();}
      });

      // Cleared count
      const cleared=zonePools.filter(p=>p===0).length;
      ctx.fillStyle='rgba(100,180,100,0.7)';ctx.font='9px monospace';
      ctx.textAlign='center';ctx.fillText(`${cleared}/5`,ox,oy+20);ctx.textAlign='left';
    }

    // ── Draw ───────────────────────────────────────────────────────────────────
    function draw(){
      drawBG();

      if(flashTimer>0){ctx.fillStyle=`rgba(255,255,255,${flashTimer/25*0.35})`;ctx.fillRect(0,0,800,500);}

      // Tubes
      portals.forEach((p,i)=>{
        const isLeft=i===0,tw=38,th=60,cx=p.x,cy=p.y,pulse=Math.sin(p.pulse)*3;
        const cleared=zonePools[p.destIndex]===0;
        const tc=cleared?'80,200,80':'160,100,40';
        ctx.beginPath();ctx.ellipse(cx,cy,tw,th+pulse,0,0,Math.PI*2);ctx.fillStyle=`rgba(${tc},0.55)`;ctx.fill();
        ctx.strokeStyle=`rgba(${tc},0.9)`;ctx.lineWidth=4;ctx.stroke();
        for(let d=1;d<=4;d++){const sc=1-d*0.18;ctx.beginPath();ctx.ellipse(cx,cy,tw*sc,th*sc+pulse*0.5,0,0,Math.PI*2);ctx.strokeStyle=`rgba(${tc},${0.5-d*0.1})`;ctx.lineWidth=2;ctx.stroke();}
        const tg=ctx.createRadialGradient(cx,cy,0,cx,cy,tw*0.6);tg.addColorStop(0,'rgba(0,0,0,0.95)');tg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath();ctx.ellipse(cx,cy,tw*0.6,th*0.6+pulse,0,0,Math.PI*2);ctx.fillStyle=tg;ctx.fill();
        const dir=isLeft?1:-1;
        for(let f=0;f<3;f++){const fp=((tick*0.04+f*0.33)%1);const fx=cx+dir*(tw+(fp*55));ctx.beginPath();ctx.moveTo(cx+dir*tw,cy+(f-1)*16);ctx.lineTo(cx+dir*(tw+50),cy+(f-1)*16);ctx.strokeStyle=`rgba(${tc},${0.15*(1-fp)})`;ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(fx,cy+(f-1)*16,2.5,0,Math.PI*2);ctx.fillStyle=`rgba(${tc},${0.6*(1-fp)})`;ctx.fill();}
        ctx.fillStyle=cleared?'rgba(80,220,80,0.9)':'rgba(210,170,100,0.85)';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(p.label,cx,cy-th-10);ctx.textAlign='left';
      });

      // Nutrients
      nutrients.forEach(n=>{
        const sc=1+Math.sin(n.pulse)*0.18;
        const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*2.5*sc);
        g.addColorStop(0,'rgba(255,230,60,0.95)');g.addColorStop(0.5,'rgba(255,160,20,0.5)');g.addColorStop(1,'rgba(255,100,0,0)');
        ctx.beginPath();ctx.arc(n.x,n.y,n.r*sc,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      });

      // WBCs
      wbcs.forEach(w=>{
        ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.fillStyle='#c41e3a';ctx.fill();
        ctx.beginPath();ctx.arc(w.x-3,w.y-2,w.r*0.45,0,Math.PI*2);ctx.fillStyle='#ff4466';ctx.fill();
        ctx.beginPath();ctx.arc(w.x+3,w.y+3,w.r*0.25,0,Math.PI*2);ctx.fillStyle='#ff6688';ctx.fill();
      });

      // Elite WBCs — white/silver neutrophil look
      eliteWBCs.forEach(w=>{
        ctx.shadowColor='rgba(200,220,255,0.9)';ctx.shadowBlur=18;
        ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.fillStyle='rgba(210,220,245,0.95)';ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2.5;ctx.stroke();
        ctx.shadowBlur=0;
        // Multi-lobe nucleus (neutrophil characteristic)
        [[-5,-3],[1,5],[6,-3]].forEach(([ox,oy])=>{
          ctx.beginPath();ctx.ellipse(w.x+ox,w.y+oy,4.5,3.5,0,0,Math.PI*2);ctx.fillStyle='rgba(70,90,190,0.75)';ctx.fill();
        });
        // Granules
        [[-8,3],[7,-5],[2,8],[-5,-7],[8,6]].forEach(([ox,oy])=>{
          ctx.beginPath();ctx.arc(w.x+ox,w.y+oy,1.8,0,Math.PI*2);ctx.fillStyle='rgba(150,130,210,0.65)';ctx.fill();
        });
      });

      // Player — active skin
      if(player.inv<=0||tick%8<4){
        ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.angle);
        const sk=SKINS.find(s=>s.id===equippedSkin)||SKINS[0];
        sk.draw();
        ctx.restore();
      }

      // HUD bars
      ctx.fillStyle='#1a1a1a';ctx.fillRect(10,472,200,16);
      ctx.fillStyle=player.health>60?'#22cc55':player.health>30?'#ddaa00':'#cc2233';
      ctx.fillRect(10,472,player.health*2,16);
      ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(10,472,200,16);

      ctx.fillStyle='#1a1a1a';ctx.fillRect(590,472,200,16);
      ctx.fillStyle=`rgba(30,${80+player.infection*1.7},60,0.95)`;
      ctx.fillRect(590,472,player.infection*2,16);
      ctx.strokeStyle='#333';ctx.strokeRect(590,472,200,16);

      // Sprint bar (center bottom)
      const sbx=300,sby=472,sbw=200,sbh=16;
      ctx.fillStyle='#1a1a1a';ctx.fillRect(sbx,sby,sbw,sbh);
      const sprintCol=isSprinting?'rgba(255,200,40,0.95)':'rgba(80,160,255,0.85)';
      ctx.fillStyle=sprintCol;ctx.fillRect(sbx,sby,sprintMeter*2,sbh);
      ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(sbx,sby,sbw,sbh);
      // flash "STAND STILL" hint when empty and not yet regenerating
      ctx.fillStyle='rgba(150,150,150,0.6)';ctx.font='9px monospace';ctx.textAlign='center';
      if(sprintMeter<5&&stillTicks<STILL_DELAY){
        ctx.fillStyle=`rgba(255,180,40,${0.5+Math.sin(tick*0.2)*0.5})`;
        ctx.fillText('STAND STILL TO RECHARGE',sbx+sbw/2,sby-2);
      } else {
        ctx.fillStyle='rgba(150,150,150,0.6)';
        ctx.fillText(isSprinting?'SPRINT ON':'SPRINT',sbx+sbw/2,sby-2);
      }
      ctx.textAlign='left';

      // HUD labels
      ctx.fillStyle='rgba(150,150,150,0.6)';ctx.font='9px monospace';
      ctx.fillText('HEALTH',14,470);
      ctx.textAlign='right';ctx.fillText('INFECT',788,470);ctx.textAlign='left';


      // Body map
      drawBodyMap();


      // ── Upgrade screen ─────────────────────────────────────────────────────
      if(state==='upgrade'){
        ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,800,500);
        ctx.textAlign='center';
        ctx.font='bold 22px monospace';ctx.fillStyle='#88ff44';ctx.fillText('ZONE CLEARED — EVOLVE',400,68);
        ctx.font='13px monospace';ctx.fillStyle='#ffcc44';ctx.fillText(`+${lastZoneTokens} 🪙 tokens earned · total this run: ${tokensEarnedThisRun}`,400,92);
        ctx.font='12px monospace';ctx.fillStyle='#555';ctx.fillText('Press 1, 2 or 3 to choose an upgrade',400,112);
        upgradeOptions.forEach((u,i)=>{
          const bx=80+i*220,by=150,bw=200,bh=120;
          ctx.fillStyle='rgba(30,50,20,0.9)';ctx.fillRect(bx,by,bw,bh);
          ctx.strokeStyle='rgba(80,200,80,0.6)';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
          ctx.fillStyle='#88ff44';ctx.font='bold 13px monospace';ctx.fillText(`[${i+1}]`,bx+bw/2,by+28);
          ctx.fillStyle='#ccffcc';ctx.font='bold 12px monospace';ctx.fillText(u.name,bx+bw/2,by+52);
          ctx.fillStyle='#668866';ctx.font='11px monospace';
          // word-wrap desc
          const words=u.desc.split(' ');let line='';let ly=by+76;
          words.forEach(w=>{const t=line?line+' '+w:w;if(ctx.measureText(t).width>bw-20){ctx.fillText(line,bx+bw/2,ly);line=w;ly+=16;}else line=t;});
          if(line) ctx.fillText(line,bx+bw/2,ly);
        });
        ctx.textAlign='left';
      }

      // ── Skin Shop overlay ──────────────────────────────────────────────────
      if(state==='shop'){
        ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,800,500);
        ctx.textAlign='center';
        ctx.font='bold 22px monospace';ctx.fillStyle='#ffcc44';ctx.fillText('PARASITE SHOP',400,36);
        ctx.font='11px monospace';ctx.fillStyle='#888';ctx.fillText(`🪙 ${tokens} tokens`,400,58);
        // Close button
        ctx.fillStyle='rgba(50,30,5,0.9)';ctx.fillRect(316,68,168,30);
        ctx.strokeStyle='rgba(255,180,40,0.7)';ctx.lineWidth=2;ctx.strokeRect(316,68,168,30);
        ctx.fillStyle='#ffcc44';ctx.font='bold 13px monospace';ctx.fillText('✕  CLOSE SHOP',400,88);
        ctx.textAlign='left';

        // 4 per row
        SKINS.forEach((sk,i)=>{
          const col=i%4, row=Math.floor(i/4);
          const bw=168,bh=130,gap=12;
          const totalW=4*(bw+gap)-gap, startX=(800-totalW)/2;
          const bx=startX+col*(bw+gap), by=106+row*(bh+gap);
          const owned=ownedSkins.includes(sk.id);
          const equipped=equippedSkin===sk.id;
          const selected=shopCursor===i;
          const canAfford=tokens>=sk.cost;

          // card bg
          ctx.fillStyle=equipped?'rgba(50,80,20,0.9)':owned?'rgba(20,40,60,0.9)':'rgba(20,20,30,0.9)';
          ctx.fillRect(bx,by,bw,bh);
          // border
          ctx.strokeStyle=selected?'#ffcc44':equipped?'#88ff44':owned?'#4488cc':'rgba(60,60,60,0.8)';
          ctx.lineWidth=selected?3:1.5;ctx.strokeRect(bx,by,bw,bh);

          // skin preview (mini draw)
          ctx.save();ctx.translate(bx+bw/2,by+52);ctx.scale(0.8,0.8);
          sk.draw();
          ctx.restore();

          // name
          ctx.fillStyle=equipped?'#88ff44':owned?'#aaccff':'#cccccc';
          ctx.font='bold 10px monospace';ctx.textAlign='center';
          ctx.fillText(sk.name,bx+bw/2,by+88);

          // status / cost
          if(equipped){ ctx.fillStyle='#44ff44';ctx.font='10px monospace';ctx.fillText('EQUIPPED',bx+bw/2,by+103); }
          else if(owned){ ctx.fillStyle='#66aaff';ctx.font='10px monospace';ctx.fillText('OWNED · ENTER equip',bx+bw/2,by+103); }
          else{
            ctx.fillStyle=canAfford?'#ffcc44':'#884422';
            ctx.font='10px monospace';
            ctx.fillText(sk.cost===0?'FREE':`🪙 ${sk.cost}`,bx+bw/2,by+103);
            if(!canAfford){ctx.fillStyle='#553322';ctx.font='9px monospace';ctx.fillText('not enough tokens',bx+bw/2,by+116);}
          }
        });
        ctx.textAlign='left';
      }

      // Dead / Win overlays
      if(state==='dead'){
        ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,800,500);
        ctx.textAlign='center';
        ctx.font='bold 46px monospace';ctx.fillStyle='#ff2244';ctx.fillText('HOST REJECTED YOU',400,170);
        ctx.font='17px monospace';ctx.fillStyle='#888';ctx.fillText('The immune system destroyed you.',400,215);
        ctx.font='14px monospace';ctx.fillStyle='#555';ctx.fillText(`Time: ${(elapsedMs/1000).toFixed(1)}s`,400,248);
        if(tokensEarnedThisRun>0){ctx.fillStyle='#ffcc44';ctx.font='14px monospace';ctx.fillText(`+${tokensEarnedThisRun} 🪙 tokens saved · total: ${tokens}`,400,275);}
        ctx.fillStyle='#444';ctx.fillText('Tap screen · or press R to try again',400,310);
        ctx.textAlign='left';
      }
      if(state==='spread'){
        ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,800,500);
        ctx.textAlign='center';
        ctx.font='bold 46px monospace';ctx.fillStyle='#44ff88';ctx.fillText('HOST FULLY INFECTED',400,145);
        const t=elapsedMs/1000;
        ctx.font='18px monospace';ctx.fillStyle='#aaffcc';ctx.fillText(`Time: ${t.toFixed(1)}s`,400,185);
        if(bestTime&&t<=bestTime){ctx.fillStyle='#ffdd44';ctx.font='15px monospace';ctx.fillText(`NEW BEST: ${bestTime.toFixed(1)}s`,400,212);}
        ctx.fillStyle='#ffcc44';ctx.font='15px monospace';ctx.fillText(`+${tokensEarnedThisRun} 🪙 tokens earned this run`,400,242);
        ctx.fillStyle='#aaffcc';ctx.font='13px monospace';ctx.fillText(`Bank: ${tokens} tokens total · Press S to spend them`,400,268);
        ctx.fillStyle='#444';ctx.font='13px monospace';ctx.fillText('Tap screen · or press R to infect again',400,300);
        ctx.textAlign='left';
      }
    }

    function loop(){update();draw();requestAnimationFrame(loop);}
    loop();

    // Register service worker for PWA / offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
